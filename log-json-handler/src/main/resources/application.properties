
hello=Hello World!

quarkus.log.console.enabled=true
quarkus.log.console.json.enabled=false
quarkus.log.file.enabled=true
quarkus.log.file.path=logs/application.log
quarkus.log.level=INFO

# Named console handler with JSON (tested via org.acme.Greeter)
quarkus.log.handler.console.demo-log-handler.enabled=true
quarkus.log.handler.console.demo-log-handler.json.enabled=true
quarkus.log.handler.console.demo-log-handler.json.pretty-print=true
quarkus.log.category."org.acme.Greeter".handlers=demo-log-handler
quarkus.log.category."org.acme.Greeter".use-parent-handlers=false

# Named console handler plain text (tested via io.xstefank.GreetingResource)
quarkus.log.handler.console.demo-log-handler-plain.enabled=true
quarkus.log.handler.console.demo-log-handler-plain.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%e%n

# Named file handler with JSON (tested via org.acme.FileGreeter)
quarkus.log.handler.file.demo-file-handler.enabled=true
quarkus.log.handler.file.demo-file-handler.path=logs/json-handler.log
quarkus.log.handler.file.demo-file-handler.json.enabled=true
quarkus.log.handler.file.demo-file-handler.json.pretty-print=true
quarkus.log.category."org.acme.FileGreeter".handlers=demo-file-handler
quarkus.log.category."org.acme.FileGreeter".use-parent-handlers=false

# Named file handler plain text (tested via io.xstefank.GreetingResource)
quarkus.log.handler.file.demo-file-handler-plain.enabled=true
quarkus.log.handler.file.demo-file-handler-plain.path=logs/plain-handler.log

# Named syslog handler with JSON (tested via org.acme.SyslogGreeter)
# Requires a syslog server running at localhost:5140
quarkus.log.handler.syslog.demo-syslog-handler.enabled=true
quarkus.log.handler.syslog.demo-syslog-handler.endpoint=localhost:5140
quarkus.log.handler.syslog.demo-syslog-handler.json.enabled=true
quarkus.log.category."org.acme.SyslogGreeter".handlers=demo-syslog-handler
quarkus.log.category."org.acme.SyslogGreeter".use-parent-handlers=false

# Named syslog handler plain text (tested via io.xstefank.GreetingResource)
# Requires a syslog server running at localhost:5140
quarkus.log.handler.syslog.demo-syslog-handler-plain.enabled=true
quarkus.log.handler.syslog.demo-syslog-handler-plain.endpoint=localhost:5141

# Named socket handler with JSON (tested via org.acme.SocketGreeter)
# Requires a socket server running at localhost:4560
quarkus.log.handler.socket.demo-socket-handler.enabled=true
quarkus.log.handler.socket.demo-socket-handler.endpoint=localhost:4560
quarkus.log.handler.socket.demo-socket-handler.json.enabled=true
quarkus.log.category."org.acme.SocketGreeter".handlers=demo-socket-handler
quarkus.log.category."org.acme.SocketGreeter".use-parent-handlers=false

# Named socket handler plain text (tested via io.xstefank.GreetingResource)
# Requires a socket server running at localhost:4560
quarkus.log.handler.socket.demo-socket-handler-plain.enabled=true
quarkus.log.handler.socket.demo-socket-handler-plain.endpoint=localhost:4561

# GreetingResource routes to all plain-text named handlers
quarkus.log.category."io.xstefank.GreetingResource".handlers=demo-log-handler-plain,demo-file-handler-plain,demo-syslog-handler-plain,demo-socket-handler-plain
quarkus.log.category."io.xstefank.GreetingResource".use-parent-handlers=false
